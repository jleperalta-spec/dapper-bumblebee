<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keepy Uppy!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #87CEEB; }
    #game-canvas { display: block; cursor: default; }
    #back-btn {
      position: fixed;
      top: 14px;
      left: 16px;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      font-size: 1rem;
      font-weight: bold;
      color: #FF4B8A;
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(0,0,0,0.12);
      z-index: 10;
      transition: transform 0.15s;
    }
    #back-btn:hover { transform: scale(1.08); }
  </style>
</head>
<body>
  <button id="back-btn" onclick="window.location.href='index.html'">← Back</button>
  <canvas id="game-canvas"></canvas>
  <script src="game.js"></script>
</body>
</html>
