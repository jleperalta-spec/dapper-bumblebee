<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keepy Uppy!</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cloud { opacity: 0.7; }
    .c1 { width:120px;height:40px; top:8%;  animation-duration:28s; animation-delay:-4s;  }
    .c1::before { width:60px;height:60px; top:-30px; left:15px; }
    .c1::after  { width:45px;height:45px; top:-20px; left:55px; }
    .c2 { width:90px; height:30px; top:22%; animation-duration:38s; animation-delay:-14s; }
    .c2::before { width:45px;height:45px; top:-22px; left:10px; }
    .c2::after  { width:35px;height:35px; top:-15px; left:42px; }
    .c3 { width:150px;height:50px;top:60%; animation-duration:22s; animation-delay:-7s;  }
    .c3::before { width:70px;height:70px; top:-35px; left:20px; }
    .c3::after  { width:55px;height:55px; top:-28px; left:72px; }

    .characters {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: clamp(0.6rem, 2vw, 1.5rem);
      justify-content: center;
      margin-bottom: 0;
    }

    .character-card:nth-child(1) .card-inner { background: linear-gradient(135deg, #ffe0ee 0%, #fff 60%); }
    .character-card:nth-child(2) .card-inner { background: linear-gradient(135deg, #e0f0ff 0%, #fff 60%); }
    .character-card:nth-child(3) .card-inner { background: linear-gradient(135deg, #ffe0e0 0%, #fff 60%); }
    .character-card:nth-child(4) .card-inner { background: linear-gradient(135deg, #fce4f0 0%, #fff 60%); }
    .character-card:nth-child(5) .card-inner { background: linear-gradient(135deg, #deeeff 0%, #fff 60%); }
    .character-card:nth-child(6) .card-inner { background: linear-gradient(135deg, #fff0e0 0%, #fff 60%); }

    /* Level picker */
    .level-picker {
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .level-label {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
      margin-bottom: 0.6rem;
    }
    .level-label span {
      font-weight: bold;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 2px 12px;
    }
    .level-buttons {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .level-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: rgba(255,255,255,0.5);
      color: #444;
      box-shadow: 0 3px 0 rgba(0,0,0,0.15);
      transition: transform 0.12s, background 0.15s;
    }
    .level-btn:hover { transform: scale(1.18); }
    .level-btn.active {
      background: #FF4B8A;
      color: #fff;
      box-shadow: 0 3px 0 rgba(180,0,80,0.35);
      transform: scale(1.12);
    }
    .level-hint {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      margin-top: 0.4rem;
    }
  </style>
</head>

  <script>
    const levelNames = ['Easy','','','','Medium','','','','','Fast'];
    let selectedLevel = 1;

    function updateLinks() {
      document.querySelectorAll('.character-card[data-character]').forEach(a => {
        a.href = `game.html?character=${a.dataset.character}&level=${selectedLevel}`;
      });
    }

    function setLevel(lvl) {
      selectedLevel = lvl;
      document.querySelectorAll('.level-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.level) === lvl);
      });
      document.getElementById('level-name').textContent = levelNames[lvl - 1] || lvl;
      updateLinks();
    }

    document.querySelectorAll('.level-btn').forEach(b => {
      b.addEventListener('click', () => setLevel(parseInt(b.dataset.level)));
    });

    updateLinks();
  </script>
